/* =========================================================
   CSS custom properties — complete token set.
   ========================================================= */
:root {
  /* ---------- Coral scale (1 lightest → 9 darkest) ----------
     Coral 5 is the brand coral; 4 and 6 are the allowed adjacent
     tints for UI states (hover/pressed). 1–3 and 7–9 are for
     editorial and data-viz only, never for states. */
  --coral-1: #FFE7E6;
  --coral-2: #F7AFAC;
  --coral-3: #F3918D;
  --coral-4: #F0746F;
  --coral-5: #ED5650;
  --coral-6: #CF4741;
  --coral-7: #B13833;
  --coral-8: #932824;
  --coral-9: #751915;

  /* ---------- Gris scale (1 lightest → 9 darkest, plus 50 mid) ----------
     Gris 2 = mist (brand), Gris 4 = gray (brand), Gris 8 = charcoal (brand).
     Gris 50 is the only mid-value neutral between 4 and 6. */
  --gris-1:  #F7F7F7;
  --gris-2:  #F1F1F1;
  --gris-3:  #E6E6E6;
  --gris-4:  #D5D6D7;
  --gris-50: #ADADAE;
  --gris-6:  #9E9E9E;
  --gris-7:  #575757;
  --gris-8:  #333333;
  --gris-9:  #1D1D1D;

  /* ---------- Dark (inverse-theme surfaces) ----------
     Used to paint strong/dark backgrounds with calibrated steps. */
  --dark:     #232323;
  --dark--10: #3C3C3C;
  --dark--20: #404040;
  --dark--25: #ADADAE;

  /* ---------- Accents (editorial / data-viz only) ----------
     Never used for CTAs, text, or UI states. Reserved for
     illustration, charts, and graphic compositions where an
     additional hue is needed. */
  --accent-blue:    #62EFFF;
  --accent-lime-2:  #9DDD05;
  --accent-lime:    #D2FF55;
  --accent-lime--1: #F4FFC7;
  --accent-yellow:  #DDCB05;

  /* ---------- Brand aliases (four-color system) ----------
     Rojo Coral   — Coral     — CMYK 69·60·56·66
     Gris Oscuro  — Charcoal  — CMYK  0·74·55·0
     Gris Neutro  — Gray      — CMYK 19·13·14·0
     Gris Claro   — Mist      — CMYK  7·5·5·0 */
  --brand-coral:    var(--coral-5);
  --brand-charcoal: var(--gris-8);
  --brand-gray:     var(--gris-4);
  --brand-mist:     var(--gris-2);
  --brand-white:    #FFFFFF;

  /* ---------- Semantic surfaces ---------- */
  --bg-default: var(--brand-mist);
  --bg-surface: var(--brand-white);
  --bg-strong:  var(--brand-charcoal);
  --bg-accent:  var(--brand-coral);

  /* ---------- Semantic text ---------- */
  --text-default: var(--brand-charcoal);
  --text-muted:   rgba(51, 51, 51, 0.65); /* charcoal @ 65% */
  --text-inverse: var(--brand-mist);
  --text-accent:  var(--brand-coral);

  /* ---------- Borders / focus / overlay ---------- */
  --border-soft:   var(--brand-gray);
  --border-strong: var(--brand-charcoal);
  --focus-ring:    var(--brand-coral);
  --overlay-scrim: rgba(51, 51, 51, 0.48);

  /* ---------- Typography families ---------- */
  --font-display: 'Safiro', 'Space Grotesk', system-ui, -apple-system, sans-serif;
  --font-body:    'Satoshi', 'Manrope', system-ui, -apple-system, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

  /* ---------- Font sizes ---------- */
  --fs-display-xl: 2rem;      /* 32px */
  --fs-display-lg: 1.625rem;  /* 26px */
  --fs-title-md:   1.125rem;  /* 18px */
  --fs-body-md:    1rem;      /* 16px */
  --fs-body-sm:    0.875rem;  /* 14px */
  --fs-caption:    0.75rem;   /* 12px */
  --fs-numeric-xl: 3rem;      /* 48px */
  --fs-numeric-lg: 2rem;      /* 32px */

  /* ---------- Line heights ---------- */
  --lh-tight:   1.25;
  --lh-normal:  1.5;
  --lh-relaxed: 1.7;

  /* ---------- Weights ---------- */
  --fw-regular: 400;
  --fw-medium:  500;
  --fw-bold:    700;

  /* ---------- Spacing scale (base 8) ---------- */
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  24px;
  --space-6:  32px;
  --space-7:  40px;
  --space-8:  48px;
  --space-9:  64px;
  --space-10: 80px;
  --space-11: 96px;

  /* ---------- Radius ---------- */
  --r-none: 0;
  --r-sm:   4px;
  --r-md:   8px;
  --r-lg:   12px;
  --r-xl:   16px;
  --r-chip: 14px;
  --r-card: 20px;
  --r-pill: 999px;
  --r-full: 9999px;

  /* ---------- Elevation / shadow ---------- */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);

  /* ---------- Stroke ---------- */
  --stroke-thin:    1px;
  --stroke-regular: 1.5px;

  /* ---------- Grid ---------- */
  --grid-max:      1280px;
  --grid-gutter-d: 24px;
  --grid-gutter-t: 16px;
  --grid-gutter-m: 16px;
}

/* =========================================================
   Element defaults — brand-primitive typography, numeric
   treatments, chip/pill base, focus, and utilities. No
   component rules here.
   ========================================================= */

html,

  .kpis { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 760px) {
  .kpis { grid-template-columns: repeat(2, 1fr); }
  .search { display: none; }
}

</style>
<style>
  .auth-stage { min-height: 100vh; display: grid; place-items: center; padding: var(--space-5); background: var(--bg-default); }
  .auth { width: 100%; max-width: 384px; }
  .auth-brand { text-align: center; margin-bottom: var(--space-7); }
  .auth-brand .mk { width: 56px; height: 56px; border-radius: var(--r-xl); background: var(--brand-coral); color: #fff; display: inline-grid; place-items: center; font-family: var(--font-display); font-weight: 500; font-size: 26px; box-shadow: var(--shadow-md); margin-bottom: var(--space-4); }
  .auth-brand h1 { font-family: var(--font-display); font-weight: 500; font-size: var(--fs-display-lg); letter-spacing: -0.01em; }
  .auth-brand p { font-size: var(--fs-body-sm); color: var(--text-muted); margin-top: 4px; }
  .auth-card { background: var(--bg-surface); border-radius: var(--r-card); box-shadow: var(--shadow-md); padding: var(--space-6); }
  .auth-card form { display: flex; flex-direction: column; gap: var(--space-5); }
  .lbl-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .lbl-row .link { font-size: var(--fs-caption); color: var(--brand-coral); cursor: pointer; font-weight: var(--fw-medium); }
  .lbl-row .link:hover { text-decoration: underline; }
  .pwrap { position: relative; }
  .pwrap .input { padding-right: 42px; }
  .eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: transparent; color: var(--text-muted); cursor: pointer; padding: 4px; display: grid; place-items: center; }
  .eye:hover { color: var(--text-default); }
  .eye svg { width: 18px; height: 18px; }
  .auth-foot { text-align: center; font-size: var(--fs-caption); color: var(--text-muted); margin-top: var(--space-5); }
  .theme-fab { position: fixed; top: var(--space-5); right: var(--space-5); }
  .back { display: inline-flex; align-items: center; gap: var(--space-2); justify-content: center; font-size: var(--fs-body-sm); color: var(--text-muted); background: transparent; border: none; cursor: pointer; }
  .back:hover { color: var(--text-default); }
  .back svg { width: 16px; height: 16px; }
  .sent-ico { width: 56px; height: 56px; border-radius: var(--r-full); background: color-mix(in srgb, #1F8A5B 14%, transparent); color: #1F8A5B; display: grid; place-items: center; margin: 0 auto var(--space-3); }
  .sent-ico svg { width: 28px; height: 28px; }
</style>
</head>
<body>
<button class="top-icon theme-fab" title="Cambiar tema" onclick="toggleTheme()"><span data-theme-ico></span></button>

<div class="auth-stage">
  <div class="auth">
    <div class="auth-brand">
      <div class="mk">S</div>
      <h1 id="brandTitle">Smart Time Control</h1>
      <p id="brandSub">Smarter scheduling</p>
    </div>

    <div class="auth-card">
      <!-- Login view -->
      <form id="loginForm" onsubmit="event.preventDefault(); location.href='dashboard.html';">
        <div class="field">
          <label class="label">Correo electrónico</label>
          <input class="input" type="email" placeholder="usuario@empresa.com" value="david.ortega@empresa.com" autocomplete="email" required>
        </div>
        <div class="field">
          <div class="lbl-row">
            <label class="label">Contraseña</label>
            <span class="link" onclick="showView('forgot')">¿Olvidaste tu contraseña?</span>
          </div>
          <div class="pwrap">
            <input class="input" id="pw" type="password" placeholder="••••••••" value="demo1234" autocomplete="current-password" required>
            <button class="eye" type="button" id="eyeBtn" aria-label="Mostrar contraseña"></button>
          </div>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;">Iniciar sesión</button>
      </form>

      <!-- Forgot view -->
      <form id="forgotForm" style="display:none;" onsubmit="event.preventDefault(); showView('sent');">
        <div class="field">
          <label class="label">Correo electrónico</label>
          <input class="input" type="email" placeholder="usuario@empresa.com" autocomplete="email" required>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;">Enviar enlace de recuperación</button>
        <button class="back" type="button" onclick="showView('login')"><span id="backIco1"></span>Volver al inicio de sesión</button>
      </form>

      <!-- Sent view -->
      <div id="sentView" style="display:none; text-align:center;">
        <div class="sent-ico" id="sentIco"></div>
        <p style="font-size:var(--fs-body-sm); color:var(--text-muted); line-height:var(--lh-relaxed); margin-bottom:var(--space-5);">Si esa dirección está registrada, recibirás un email con el enlace. Revisa también la carpeta de spam.</p>
        <button class="back" type="button" onclick="showView('login')"><span id="backIco2"></span>Volver al inicio de sesión</button>
      </div>
    </div>

    <p class="auth-foot">Smart Time Control · 2026</p>
  </div>
</div>

<script>
/* ============================================================
   Smart Time Control — shared shell (sidebar + topbar + theme)
   Pages set window.STC = { page, title, subtitle, actions? } then load this.
   ============================================================ */
(function () {
  "use strict";

  /* ---------- Icon set (Lucide paths, 1.5 stroke, currentColor) ---------- */
  var ICONS = {
    dashboard: '<rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>',
    scheduler: '<path d="M8 2v4M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>',
    mihorario: '<path d="M8 2v4M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18m-12 6 2 2 4-4"/>',
    jornada: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
    employees: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',
    areas: '<rect width="16" height="20" x="4" y="2" rx="2"/><path d="M9 22v-4h6v4M8 6h.01M16 6h.01M8 10h.01M16 10h.01M8 14h.01M16 14h.01"/>',
    absences: '<path d="M8 2v4M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18m-7 4 4 4m0-4-4 4"/>',
    reports: '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/><path d="M14 2v5h5M8 13h2v5M14 11h2v7"/>',
    settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
    logout: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>',
    search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
    bell: '<path d="M10.268 21a2 2 0 0 0 3.464 0M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>',
    sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>',
    moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
    alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><path d="M12 9v4M12 17h.01"/>',
    check: '<path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/>',
    trend: '<path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/>',
    coins: '<circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18M7 6h1v4M16.71 13.88l.7.71-2.82 2.82"/>',
    clock: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
    sparkles: '<path d="M9.94 4.66a1 1 0 0 1 1.9 0l1.13 3.36 3.36 1.13a1 1 0 0 1 0 1.9l-3.36 1.13-1.13 3.36a1 1 0 0 1-1.9 0L8.81 13.18 5.45 12.05a1 1 0 0 1 0-1.9l3.36-1.13z"/><path d="M18 5h.01M19 13h.01"/>',
    lock: '<rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
    unlock: '<rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>',
    eraser: '<path d="m7 21-4.3-4.3a1 1 0 0 1 0-1.4l9.6-9.6a1 1 0 0 1 1.4 0l5.6 5.6a1 1 0 0 1 0 1.4L13 21M22 21H7"/>',
    swap: '<path d="m16 3 4 4-4 4M20 7H4M8 21l-4-4 4-4M4 17h16"/>',
    history: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5M12 7v5l4 2"/>',
    chevL: '<path d="m15 18-6-6 6-6"/>',
    chevR: '<path d="m9 18 6-6-6-6"/>',
    chevD: '<path d="m6 9 6 6 6-6"/>',
    filter: '<path d="M3 4h18l-7 8v6l-4 2v-8z"/>',
    plus: '<path d="M5 12h14M12 5v14"/>',
    x: '<path d="M18 6 6 18M6 6l12 12"/>',
    play: '<polygon points="6 3 20 12 6 21 6 3"/>',
    pause: '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>',
    coffee: '<path d="M10 2v2M14 2v2M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1zM16 8h3a3 3 0 0 1 0 6h-3"/>',
    utensils: '<path d="M3 2v7c0 1.1.9 2 2 2h0a2 2 0 0 0 2-2V2M5 2v20M21 15V2a5 5 0 0 0-3 5v6c0 1.1.9 2 2 2h1Z"/>',
    download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>',
    edit: '<path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
    trash: '<path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
    user: '<circle cx="12" cy="8" r="5"/><path d="M3 21a9 9 0 0 1 18 0"/>',
    shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>',
    building: '<rect width="16" height="20" x="4" y="2" rx="2"/><path d="M9 22v-4h6v4M8 6h.01M16 6h.01M8 10h.01M16 10h.01M8 14h.01M16 14h.01"/>',
    dots: '<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>',
    arrowRight: '<path d="M5 12h14M12 5l7 7-7 7"/>',
    refresh: '<path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>',
    mappin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
    grid: '<rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>',
    list: '<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
    calendar: '<path d="M8 2v4M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>'
  };

  function icon(name, size) {
    var s = size || 20;
    return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round">' + (ICONS[name] || "") + "</svg>";
  }
  window.icon = icon;

  /* ---------- Navigation ---------- */
  var NAV = [
    { key: "dashboard",  label: "Dashboard",          icon: "dashboard",  href: "dashboard.html" },
    { key: "scheduler",  label: "Programación",        icon: "scheduler",  href: "scheduler.html" },
    { key: "mihorario",  label: "Mi Horario",          icon: "mihorario",  href: "mi-horario.html" },
    { key: "jornada",    label: "Control de Jornada",  icon: "jornada",    href: "jornada.html" },
    { key: "employees",  label: "Trabajadores",        icon: "employees",  href: "employees.html" },
    { key: "areas",      label: "Áreas",               icon: "areas",      href: "areas.html" },
    { key: "absences",   label: "Ausencias",           icon: "absences",   href: "absences.html" },
    { key: "reports",    label: "Reportes",            icon: "reports",    href: "reports.html" },
    { key: "settings",   label: "Configuración",       icon: "settings",   href: "settings.html" }
  ];

  var CFG = window.STC || {};

  /* ---------- Theme ---------- */
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    try { localStorage.setItem("stc-theme", t); } catch (e) {}
    document.querySelectorAll("[data-theme-ico]").forEach(function (el) {
      el.innerHTML = icon(t === "dark" ? "sun" : "moon", 18);
    });
  }
  window.toggleTheme = function () {
    var cur = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    applyTheme(cur === "dark" ? "light" : "dark");
  };

  /* ---------- Build sidebar ---------- */
  function buildSidebar() {
    var el = document.querySelector(".sidebar");
    if (!el) return;
    var navHTML = NAV.map(function (n) {
      var active = n.key === CFG.page ? " is-active" : "";
      return '<a class="nav-item' + active + '" href="' + n.href + '">' + icon(n.icon) + "<span>" + n.label + "</span></a>";
    }).join("");
    el.innerHTML =
      '<div class="brand"><div class="brand-mark">S</div><div><div class="brand-name">Smart Time Control</div><div class="brand-sub">Smarter scheduling</div></div></div>' +
      '<nav class="nav">' + navHTML + "</nav>" +
      '<div class="user"><div class="avatar">DO</div><div><div class="user-name">David Ortega</div><div class="user-role">Administrador</div></div>' +
      '<button class="icon-btn" title="Cerrar sesión" onclick="location.href=\'login.html\'">' + icon("logout") + "</button></div>";
  }

  /* ---------- Build topbar ---------- */
  function buildTopbar() {
    var el = document.querySelector(".topbar");
    if (!el) return;
    el.innerHTML =
      "<div><h1>" + (CFG.title || "") + "</h1>" + (CFG.subtitle ? '<div class="sub">' + CFG.subtitle + "</div>" : "") + "</div>" +
      '<div class="topbar-right">' +
      (CFG.actions || "") +
      '<div class="search">' + icon("search") + '<input type="text" placeholder="Buscar..."></div>' +
      '<button class="top-icon" title="Cambiar tema" onclick="toggleTheme()"><span data-theme-ico></span></button>' +
      '<div class="top-icon" title="Notificaciones">' + icon("bell") + '<span class="dot"></span></div>' +
      '<div class="top-avatar">DO</div>' +
      "</div>";
  }

  /* ---------- Init ---------- */
  function init() {
    buildSidebar();
    buildTopbar();
    var saved = "light";
    try { saved = localStorage.getItem("stc-theme") || "light"; } catch (e) {}
    applyTheme(saved);
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();

</script>
<script>
  // Toggle password visibility
  var eyeOpen = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  var eyeOff = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round"><path d="M10.7 5.1A9.7 9.7 0 0 1 12 5c7 0 10 7 10 7a13.2 13.2 0 0 1-1.7 2.7M6.6 6.6A13.2 13.2 0 0 0 2 12s3 7 10 7a9.7 9.7 0 0 0 4.5-1.1M3 3l18 18M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>';
  var eb = document.getElementById('eyeBtn'); eb.innerHTML = eyeOff;
  eb.addEventListener('click', function(){ var p=document.getElementById('pw'); var on=p.type==='password'; p.type=on?'text':'password'; eb.innerHTML=on?eyeOpen:eyeOff; });
  document.getElementById('sentIco').innerHTML = icon('check', 28);
  document.getElementById('backIco1').innerHTML = icon('chevL', 16);
  document.getElementById('backIco2').innerHTML = icon('chevL', 16);

  var titles = { login:['Smart Time Control','Smarter scheduling'], forgot:['Recuperar contraseña','Te enviaremos un enlace a tu correo'], sent:['Revisa tu correo','Enviamos un enlace a tu correo'] };
  function showView(v){
    document.getElementById('loginForm').style.display = v==='login'?'flex':'none';
    document.getElementById('forgotForm').style.display = v==='forgot'?'flex':'none';
    document.getElementById('sentView').style.display = v==='sent'?'block':'none';
    document.getElementById('brandTitle').textContent = titles[v][0];
    document.getElementById('brandSub').textContent = titles[v][1];
  }
</script>
</body>
</html>
